<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SeBa online</title>
  <script src='https://cdn.plot.ly/plotly-3.3.0.min.js'></script>
  <style>
    body {
	font-family: sans-serif;
	color: #666;
      margin: 20px;
    }

    label {
      display: inline-block;
    }

    /* Hide the stepper controls in the number input fields */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
	-webkit-appearance: none;
	margin: 0;
    }
    /* Using `textfield` does not work in Safari, but is the solution for Firefox */
    input[type="number"] {
	appearance: textfield;
	width: 80px;
	text-align: right;
    }

    #program-log output {
	display: block;
      font-family: monospace;
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 8px;
      overflow-y: auto;
      line-height: 1.2em;
      min-height: calc(1.2em * 20); /* approx. 20 lines visible */
      max-height: 400px;
      background: #f9f9f9;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 600px;
    }
    .tooltip {
	position: relative;
	display: inline-block;
    }
    .tooltiptext {
	visibility: hidden; /* Hidden by default */
	width: 260px;
	background-color: #cccccc;
	color: #333333;
	text-align: center;
	padding: 5px 0;
	border-radius: 6px;
	position: absolute;
	z-index: 1; /* Ensure tooltip is displayed above content */
    }

    /* Show the tooltip text on hover */
    .tooltip:hover .tooltiptext {
	visibility: visible;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 4px 8px;
      text-align: left;
      font-family: monospace;
    }

    th {
      background: #eee;
    }

    #start-button {
      display: block;
      &:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    #status {
      margin-left: 10px;
      font-size: 0.9em;
      font-style: italic;
      color: #555;
    }

    nav select {
	text-align: right;
	float: right;
    }

    /* Hide the (drop-down) arrows and style the <select> element as minimally as possible */
    #lang-switch {
	font-size: large;  /* <select> doesn't automatically inherit font-size, since it's native to the browser */
	appearance: none;
	-webkit-appearance: none;
	-moz-appearance: none;
	background: none;
	border: none;
	padding: 0;

	&::-ms-expand {
	    /* For IE and EdgeHTML: hide dropdown arrow */
	    display: none;
	}
    }

    h2 {
	margin-bottom: 1em;
	padding: 0.5em 0.5ex;
	color: brown;
	font-size: x-large;
    }
    details summary {
	margin-bottom: 1em;
	padding: 0.5em 0.5ex;
	color: brown;
	font-size: x-large;
    }


  </style>
</head>
<body>
    <nav>
      <select id="lang-switch" name="lang" onchange="switchLang(this.value);">
	<option value="nl" selected>🇳🇱 NL</option>
	<option value="en">🇬🇧 En</option>
      </select>
  </nav>

    <h1 data-i8n="seba-main-title">SeBa online</h1>

    <section>
      <details id="introduction" open>
	<summary data-i8n="introduction"></summary>
	<p data-i8n="introduction-text"></p>
      </details>
    </section>

  <section id="controls">
    <form id="user-input">
      <template id="control-template">
	<div id="template-slider">
	  <input type="range" id="template-range" step="0.01" data-input="template-input"> <!--  oninput="updateFromSlider(this)" -->
	  <input type="number" id="template-input" min="0.01" max="100" value="1" step="any" data-prec="2" data-range="template-range" onblur="clampValue(this);">
	  <div class="tooltip" id="template-tooltip">ⓘ <span class="tooltiptext" data-i8n="template-tooltip">something here</span></div>
	  <p><label for="template-input"><span data-i8n="template-name"></span>(<span id="template-min-value"></span> &ndash; <span id="template-max-value"></span>)</label></p>
	</div>
      </template>
    </form>
  <div>
    <button id="start-button" disabled data-i8n="start">Start</button>
    <input type="checkbox" id="direct-update"></input>
    <label for="direct-update"><span data-i8n="update-directly"></span></label>
    <div class="tooltip" id="update-directly-tooltip">ⓘ <span class="tooltiptext" data-i8n="update-directly-tooltip"></span></div>
    <p id="status"></p>
  </div>

  <section>
    <details id="program-log">
      <summary data-i8n="program-log">Program log</summary>
      <output></output>
    </details>
  </section>

  <section>
    <h2 data-i8n="header-graph">Graph</h2>
    <div id="graph"></div>
    <div>
      <div>
      <label for="graph-style" data-i8n="graph-style"></label>
      <select name="style" id="graph-style" disabled>
	<option value="linlin" data-i8n="graph-linlin"></option>
	<option value="loglog" selected data-i8n="graph-loglog"></option>
	<option value="linlog" data-i8n="graph-linlog"></option>
	<option value="loglin" data-i8n="graph-loglin"></option>
      </select>
      </div>
      <div>
      <label for="x-axis" data-i8n="x-axis"></label>
	<select name="xaxis" id="x-axis" disabled></select>
      </div>
      <div>
      <label for="y-axis" data-i8n="y-axis"></label>
      <select name="yaxis" id="y-axis" disabled></select>
      </div>
    </div>
  </section>

  <section id="data-section">
    <h2 data-i8n="header-results">Results</h2>
    <button id="download-data" data-i8n="download-data" disabled onclick="downloadData();">Download data as CSV</button>
    <table id="data-table">
      <thead>
        <tr>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>

    <!-- Load the generated JS glue code (SeBa.js) after the setup -->
  <script src="seba.js"></script>

  <script>

  const FALLBACK_LANG = "en";
  // Give the user some milliseconds to update a value before
  // running SeBa again
  const INPUTTIMEOUT = 500;
  // all data fields output by SeBa in `seba.data`
  const DATAFIELDS = ['binid', 'bintype', 'transfertype', 'time',
		      'sep', 'ecc', 'id1', 'type1', 'mass1',
		      'radius1', 'efftemp1', 'coremass1',
		      'id2', 'type2', 'mass2',
		      'radius2', 'efftemp2', 'coremass2'];

  // data columns only of interest
  const USERDATAFIELDS = [
      'transfertype', 'time', 'sep', 'ecc',
      'id1', 'type1', 'mass1', 'radius1', 'efftemp1', 'coremass1',
      'id2', 'type2', 'mass2', 'radius2', 'efftemp2', 'coremass2'
  ];

  const CONTROLS = [
      {name: "mass1", min: 0.01, max: 100, value: 2, step: 0.01, prec: 2, log: true},
      {name: "mass2", min: 0.01, max: 100, value: 1, step: 0.01, prec: 2, log: true},
      {name: "ecc", min: 1e-5, max: 1, value: 0.2, step: 0.0001, prec: 4, log: true},
      {name: "sep", min: 1, max: 1e4, value: 200, step: 0.01, prec: 1, log: true},
      {name: "time", min: 1, max: 1e7, value: 13500, step: 0.1, prec: 0, log: true},
      {name: "metal", min: 1e-4, max: 0.03, value: 1e-3, step: 0.0001, prec: 5, log: true}
  ];
  const GRAPHDEFAULTS = {
      'x': "time",
      "y": "sep"
  };

  // Supported languages with a translation file
  const LANGUAGES = ["en", "nl"];

  const stdoutElem = $q('#program-log output');

  // Collect output lines in memory as well
  const stdoutLines = [];
  const stderrLines = [];


  function $id(idspec) {
      return document.getElementById(idspec);
  }

  function $q(selector) {
      return document.querySelector(selector);
  }

  function $qa(selector) {
      return document.querySelectorAll(selector);
  }

  function $create(element) {
      return document.createElement(element);
  }


    let translations = {};
    let data = {};

  function updateTableHeader() {
      const lang = document.documentElement.lang;
      const translation = translations[lang];
      let ths = [];
      for (const col of USERDATAFIELDS) {
	  key = `${col}-field`;
	  const th = $create('th');
	  let name = "";
	  if (key in translation) {
	      name = translation[key];
	  } else { // Fall back to the default language
	      name = translations[FALLBACK_LANG][key];
	  }
	  if (!name) {  // Fall back to the base column identifier
	      name = col;
	  }
	  th.textContent = name;
	  ths.push(th);
      }
      var row = $q('#data-table thead tr');
      row.replaceChildren(...ths);
  }


  // Helper to append a line to the stdout display
  function appendOutput(text) {
      // const prefix = isError ? '[stderr] ' : '';  // use when separating stdout and stderr
      // const line = prefix + text;

      stdoutLines.push(text);
      stdoutElem.textContent = stdoutLines.join('\n');

      // Scroll to bottom
      // stdoutElem.scrollTop = stdoutElem.scrollHeight;
  }

  function setupModule() {
      // Emscripten Module configuration object
      Module = {
	  print: function(text) {
	      appendOutput(text);
	  },
	  printErr: function(text) {
	      appendOutput(text);
	  },
	  //onRuntimeInitialized: function() {
	  //    // Enable the Run button once WASM is ready
	  //    $id('start-button').disabled = false;
	  //}
      };
  }

  function createControls() {
      let updateTimeout = null; // Keeps track of input waiting time

      const template = $q("#control-template");
      for (const control of CONTROLS) {
	  const clone = document.importNode(template.content, true);
	  const name = control["name"];

	  let div = clone.querySelector("div");
	  div.id = `${name}-control`;
	  let tooltip = div.querySelector("div");
	  tooltip.id = `${name}-tooltip`;
	  let tooltiptext = tooltip.querySelector("span");
	  tooltiptext.dataset.i8n = `${name}-tooltip`;

	  let label = clone.querySelector("label");
	  label.name = name;
	  label.htmlFor = `${name}-input`;
	  //label.dataset.i8n = `${name}-label`;
	  label.innerHTML = `<span data-i8n="${name}-name"></span> (<span id="${name}-min-value"></span> &ndash; <span id="${name}-max-value"></span>)</label>`;
	  let input = clone.querySelector("input[type=number]");
	  input.id = `${name}-input`;
	  input.min = control["min"];
	  input.max = control["max"];
	  input.value = control["value"];
	  //input.step = control["step"];
	  input.dataset.prec = control["prec"];
	  input.dataset.range = name;

	  let slider = clone.querySelector("input[type=range]");
	  slider.id = `${name}-range`;
	  slider.min = Math.log10(control["min"]);
	  slider.max = Math.log10(control["max"]);
	  slider.value = Math.log10(control["value"]);
	  slider.dataset.input = name;

	  slider.addEventListener("input", function(evt) {
	      updateFromSlider(this);
	  });
	  slider.addEventListener("input", function(evt) {
	      clearTimeout(updateTimeout);
	      if ($id('direct-update').checked) {
		  updateTimeout = setTimeout(() => {
	  	      runSeba();
		  }, INPUTTIMEOUT);
	      }
	      });

	  input.addEventListener("input", function(evt) {
	      updateFromInput(this);
	  });
	  input.addEventListener("input", function(evt) {
	      clearTimeout(updateTimeout);
	      if ($id('direct-update').checked) {
		  updateTimeout = setTimeout(() => {
	  	      runSeba();
		  }, INPUTTIMEOUT);
	      }
	  });

	  const form = $q("#controls form");
	  form.appendChild(clone);
      }
  }

  function updateMinMax() {
      for (const label of $qa("form#user-input label")) {
	  const name = label.name;
	  let values = [];
	  for (const control of CONTROLS) {
	      if (control["name"] == name) {
		  values = {"min": control["min"], "max": control["max"]};
		  break;
	      }
	  }
	  if (!values) {
	      console.warn("Missing min-max values for ", name);
	      return ;
	  }
	  let minval = label.querySelector(`#${name}-min-value`);
	  minval.textContent = values["min"];
	  let maxval = label.querySelector(`#${name}-max-value`);
	  maxval.textContent = values["max"];
      }

  }

  async function loadTranslations() {
      for (lang of LANGUAGES) {
	  try {
	      const response = await fetch(`${lang}.json`);

	      if (!response.ok) {
		  throw new Error(`Could not fetch ${lang}.json`);
	      }
	      translations[lang] = await response.json();
	  } catch (error) {
	      console.error("Translation error:", error);
	  }
      }
  }

  function updatePlotOptions() {
      for (const name of ['x', 'y']) {
	  let axis = $id(`${name}-axis`);
	  let selection = axis.value;
	  if (!axis.value) {
	      selection = GRAPHDEFAULTS[name];
	  }
	  let options = [];
	  for (const field of USERDATAFIELDS) {
	      let option = $create("option");
	      option.value = field;
	      option.textContent = _t(`${field}-field`);
	      if (field == selection) {
		  option.selected = true;
	      }
	      options.push(option);
	  }
	  axis.replaceChildren(...options);
      }
  }

  function switchLang(lang) {
      document.documentElement.lang = lang;
      if (!lang in translations) {
	  lang = FALLBACK_LANG;
      }
      const translation = translations[lang];
      const elements = document.querySelectorAll("[data-i8n]");
      for (const element of elements) {
	  const key = element.dataset.i8n;
	  if (key in translation) {
	      value = translation[key];
	      element.innerHTML = value;
	  } else {
	      value = translations[FALLBACK_LANG][key];
	      console.log(`falling back to default translation for ${key} = ${value}`);
	      element.innerHTML = value;
	  }
      }
      updateTableHeader();
      updatePlotOptions();

  }


  function updateFromSlider(slider) {
      const id = `${slider.dataset.input}-input`;
      let input = $id(id);
      const actualValue = Math.pow(10, parseFloat(slider.value));
      input.value = actualValue.toFixed(parseInt(input.dataset.prec));
  }

  // Convert actual value back to slider position (log10)
  function updateFromInput(input) {
      const id = `${input.dataset.range}-range`;
      const slider = $id(id);
      const min = parseFloat(input.min);
      const max = parseFloat(input.max);
      value = parseFloat(input.value);
      if (isNaN(value)) {
	  return ;
      }

      if (value < min) {
	  value = min;
      } else if (value > max) {
	  value = max;
      }
      if (value > 0) {
	  slider.value = Math.log10(value);
      }
  }

  function clampValue(input) {
      const min = parseFloat(input.min);
      const max = parseFloat(input.max);
      let value = parseFloat(input.value);

      if (isNaN(value)) {
	  input.value = min; // Default to min if input is empty/invalid
	  updateFromInput(input);
	  return;
      }

      if (value < min) {
	  input.value = min;
      } else if (value > max) {
	  input.value = max;
      }
  }

  // function to translate strings in JavaScript code
  function _t(key) {
      let lang = document.documentElement.lang;
      if (!lang in translations) {
	  lang = FALLBACK_LANG;
      }
      const translation = translations[lang];
      let string = "";
      if (!key in translation) {
	  string = translations[FALLBACK_LANG][key];
      } else {
	  string = translation[key];
      }
      if (!string) {
	  string = "";
      }
      console.log(key, string);
      return string;
  }

  function createConfig() {
    return
  }

  // Run SeBa
  async function runSeba() {
      $id('start-button').disabled = true;
      const Module = await createSeBa({
	  print: (text) => appendOutput(text),
	  printErr: (text) => appendOutput(text),
	  //printErr: function(text) {
	  //    appendOutput(text);
	  //},
      });

      if (!Module || !Module.callMain) {
	  alert('Module not initialized yet.');
	  return;
      }

      // Clear previous output
      stdoutLines.length = 0;
      stdoutElem.textContent = '';
      // Update status
      $id('status').textContent = _t("running...");
      const args = [
	  '-M',
	  document.getElementById('mass1-input').value.trim(),
	  '-m',
	  document.getElementById('mass2-input').value.trim(),
	  '-e',
	  document.getElementById('ecc-input').value.trim(),
	  '-a',
	  document.getElementById('sep-input').value.trim(),
	  '-T',
	  document.getElementById('time-input').value.trim(),
	  '-z',
	  document.getElementById('metal-input').value.trim()
      ];

      // Remove previous SeBa.data if it exists
      try {
	  Module.FS.unlink('SeBa.data');
      } catch (e) {
	  // Ignore if file did not exist
	  console.debug("Error when attempting to remove 'SeBa.data': ", e);
      }

      // Call main(argc, argv) via callMain
      try {
	  Module.callMain(args);
      } catch (e) {
	  appendOutput('Exception: ' + e, true);
	  console.error("EXCEPTION: ", e);
      }

      // After main returns, try to read output.txt
      try {
	  const text = Module.FS.readFile('SeBa.data', { encoding: 'utf8' });
	  data = readData(text);

	  $id('download-data').disabled = false;
	  // Enable graph options
	  $id('graph-style').disabled = false;
	  $id('x-axis').disabled = false;
	  $id('y-axis').disabled = false;
	  // Clear event listeners and readd then,
	  // so that the graph updates with the current data
	  // Since the listeners are an anonymous closure over `data`,
	  // we replace the element with a clone; the clone doesn't
	  // copy the listener, so a new listener is added, which is
	  // then the only listener
	  for (const id of ['graph-style', 'x-axis', 'y-axis']) {
	      const elem = $id(id);
	      const newElem = elem.cloneNode(true);
	      newElem.value = elem.value;
	      newElem.addEventListener('change', () => {
		  plot(data);
		  populateTable(data);
	      });
	      const parent = elem.parentNode;
	      parent.replaceChild(newElem, elem);
	  }
	  populateTable(data);
	  plot(data);
      } catch (e) {
	  appendOutput('Could not read SeBa.data: ' + e, true);
      }

      // Reset the start button and status field
      $id('start-button').disabled = false;
      $id('status').textContent = '';
  };

  $id('start-button').addEventListener('click', runSeba)


  function readData(fileContent) {
      var array = Array.from({length: 18}, _ => []);
      const lines = fileContent.split(/\r?\n/);
      for (const line of lines) {
	  const trimmed = line.trim();
	  if (!trimmed) {
	      continue;
	  }
	  const cols = trimmed.split(/\s+/);
	  for (const i in cols) {
	      array[i].push(parseFloat(cols[i]));
	  }
      }

      data = {};
      DATAFIELDS.forEach((name, index) => {
	  data[name] = array[index];
      });
      return data;
  }

  function populateTable(data) {
      let trs = [];
      for (var rownr = 0; rownr < data[USERDATAFIELDS[0]].length; ++rownr) {
	  let tr = $create('tr');
	  for (const col of USERDATAFIELDS) {
	      const td = $create('td');
	      td.textContent = data[col][rownr];
	      tr.appendChild(td);
	  }
	  trs.push(tr);
      }
      let tbody = $q('#data-table tbody');
      tbody.replaceChildren(...trs);
  }

  function plot(data) {
      let xaxis = $id('x-axis').value;
      let yaxis = $id('y-axis').value;
      if (!xaxis in data) {
	  xaxis = GRAPHDEFAULTS['x'];
      }
      if (!yaxis in data) {
	  yaxis = GRAPHDEFAULTS['y'];
      }

      const graphtype = $id("graph-style").value;
      let xtype = "log";
      let ytype = "log";
      if (graphtype == "linlin") {
	  xtype = "linear";
	  ytype = "linear";
      }
      if (graphtype == "loglin") {
	  xtype = "log";
	  ytype = "linear";
      }
      if (graphtype == "linlog") {
	  xtype = "linear";
	  ytype = "log";
      }

      let plottingData = {
	  x: data[xaxis],
	  y: data[yaxis],
	  type: 'scatter'
      };

      let layout = {
	  xaxis: {
	      type: xtype,
	      autorange: true
	  },
	  yaxis: {
	      type: ytype,
	      autorange: true
	  }
      };

      Plotly.newPlot('graph', [plottingData], layout);
  }

    function dataToCSV(data) {
	const keys = Object.keys(data);
	const header = keys.map(key => _t(`${key}-field`)).join(',');
	const length = data[keys[0]].length;

	const rows = [];
	for (let i = 0; i < length; i++) {
	    const row = keys.map(key => data[key][i] ?? '').join(',');
	    rows.push(row);
	}

	return header + '\n' + rows.join('\n');
    }

    function downloadData() {
	const csv = dataToCSV(data);
	const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
	const url = URL.createObjectURL(blob);
	const link = document.createElement('a');
	link.href = url;
	link.download = 'SeBadata.csv';
	document.body.appendChild(link);
	link.click();
	document.body.removeChild(link);
	URL.revokeObjectURL(url);
    };

  function init() {
      createControls();
      updateMinMax();
      loadTranslations().then(() => {
	  switchLang("nl");
	  $id('start-button').disabled = false;
      });

  }
    init();



  </script>

</body>
</html>
